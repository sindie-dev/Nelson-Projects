<div class="bento-grid">
    <style>
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }
        .bento-item {
            position: relative;
            overflow: hidden;
            transition: transform 0.3s;
        }
        .bento-item img {
            width: 100%;
            height: auto;
        }
        .bento-item:hover {
            transform: scale(1.05);
        }
    </style>
    <div class="bento-item big"><img src="assets/image1.jpg" alt="Sample Item 1"></div>
    <div class="bento-item medium"><img src="assets/image2.jpg" alt="Sample Item 2"></div>
    <div class="bento-item small"><img src="assets/image3.jpg" alt="Sample Item 3"></div>
    <div class="bento-item small"><img src="assets/image4.jpg" alt="Sample Item 4"></div>
    <div class="bento-item medium"><img src="assets/image5.jpg" alt="Sample Item 5"></div>
    <div class="bento-item big"><img src="assets/image6.jpg" alt="Sample Item 6"></div>
    <div class="bento-item small"><img src="assets/image7.jpg" alt="Sample Item 7"></div>
    <div class="bento-item big"><img src="assets/image8.jpg" alt="Sample Item 8"></div>
</div>
